name: apex_housing
description: APEX Housing - Short-term rental platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  pdf: ^3.10.8
  path_provider: ^2.1.3
  dio: ^5.7.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.2
  geolocator: ^14.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  local_auth: ^2.3.0
  app_links: ^6.3.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
